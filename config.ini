[default]
start_folder =  # start folder containing data for processing
supress_ROIquestion = 0 # 0 - ask question, 1 - response no, 2 - yes
HeightfromZ = 0
ROImode = 0 # 0 - "no selection", 1 - "select above h-level", 2 - "draw", 3- "draw and select above h-level"
h_level = -10000  # nm, low value to select all points
save_short = 0

[cells]
start_folder =  # start folder containing data for processing
supress_ROIquestion = 2  # 0 - ask question, 1 - response no, 2 - yes
HeightfromZ = 1
ROImode = 3    # 0 - "no selection", 1 - "select above h-level", 2 - "draw", 3- "draw and select above h-level"
h_level = 200  # nm, low value to select all points
save_short = 1